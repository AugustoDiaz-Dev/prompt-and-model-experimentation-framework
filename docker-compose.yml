services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: experiments
      POSTGRES_USER: experiments
      POSTGRES_PASSWORD: experiments
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-mlflow-db.sh:/docker-entrypoint-initdb.d/init-mlflow-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U experiments -d experiments"]
      interval: 2s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://experiments:experiments@postgres:5432/mlflow --default-artifact-root ./mlruns
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mlflow_data:/mlflow/mlruns

volumes:
  postgres_data:
  mlflow_data:
